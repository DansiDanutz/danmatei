<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 1080px;
        height: 1920px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 20%, #1e3a8a 0%, #0b1020 60%, #000 100%);
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        color: #fff;
      }
      .stage { position: relative; width: 100%; height: 100%; }
      .grid {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 80px 80px;
        opacity: 0;
      }
      .ball {
        position: absolute;
        width: 220px; height: 220px;
        left: 50%; top: 38%;
        margin-left: -110px; margin-top: -110px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffffff 0%, #cbd5e1 60%, #475569 100%);
        box-shadow: 0 40px 120px rgba(59,130,246,0.45), inset -20px -20px 40px rgba(0,0,0,0.35);
      }
      .pentagon {
        position: absolute;
        width: 60px; height: 60px;
        background: #0b1020;
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
      }
      .title {
        position: absolute;
        left: 0; right: 0;
        top: 64%;
        text-align: center;
        font-weight: 700;
        font-size: 110px;
        letter-spacing: -2px;
        line-height: 0.95;
      }
      .accent { color: #fbbf24; }
      .subtitle {
        position: absolute;
        left: 0; right: 0;
        top: 78%;
        text-align: center;
        font-size: 42px;
        font-weight: 500;
        color: #cbd5e1;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .badge {
        position: absolute;
        left: 50%;
        bottom: 8%;
        transform: translateX(-50%);
        padding: 18px 36px;
        border: 2px solid rgba(251,191,36,0.5);
        border-radius: 999px;
        font-size: 28px;
        letter-spacing: 4px;
        color: #fbbf24;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div
      class="stage"
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
    >
      <div class="grid" id="grid"></div>
      <div class="ball" id="ball">
        <div class="pentagon" style="left: 80px; top: 80px"></div>
        <div class="pentagon" style="left: 120px; top: 110px; transform: rotate(72deg)"></div>
      </div>
      <div class="title" id="title">
        Școala de Fotbal<br />
        <span class="accent">Dan Matei</span>
      </div>
      <div class="subtitle" id="subtitle">Pasiune. Disciplină. Performanță.</div>
      <div class="badge" id="badge">Începe astăzi</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.to("#grid", { opacity: 1, duration: 1.2, ease: "power2.out" }, 0)
        .from("#ball", { scale: 0.4, opacity: 0, duration: 1.0, ease: "back.out(2)" }, 0.2)
        .to("#ball", { y: -30, duration: 1.2, ease: "sine.inOut", yoyo: true, repeat: 3 }, 1.2)
        .from("#title", { y: 80, opacity: 0, duration: 0.9, ease: "power3.out" }, 1.0)
        .from("#subtitle", { y: 40, opacity: 0, duration: 0.8, ease: "power3.out" }, 1.4)
        .from("#badge", { scale: 0.8, opacity: 0, duration: 0.6, ease: "back.out(2)" }, 2.0);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
